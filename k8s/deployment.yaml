
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-app
  template:
    metadata:
      labels:
        app: ml-app
    spec:
      containers:
      - name: ml-app
        image: REGION-docker.pkg.dev/PROJECT_ID/ml-repo/ml-app:latest
        ports:
        - containerPort: 5000
